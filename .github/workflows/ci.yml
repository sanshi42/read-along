name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          version: 0.8.13

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --locked --python 3.12

      - name: Ruff format check
        run: make format-check-python

      - name: Ruff lint
        run: make lint-python

      - name: Pyrefly
        run: make typecheck

      - name: Pytest
        run: make test-python

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Biome format check
        run: make format-check-web

      - name: Biome lint
        run: make lint-web

      - name: Web unit tests
        run: make test-web

      - name: Web build
        run: make build-web

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - python
      - web

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          version: 0.8.13

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --locked --python 3.12

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Install Chromium
        run: npx --prefix web playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: make check-browser
